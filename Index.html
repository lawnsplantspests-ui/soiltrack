<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>SoilTracks - Lawns Plants & Pests</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0c0c0c; color: #e7e5e4; font-family: Georgia, serif; min-height: 100vh; font-size: 16px; }

  /* ── Header ── */
  .header { background: #111; border-bottom: 1px solid #292524; padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-icon { width: 40px; height: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; overflow: hidden; }
  .logo-text { font-size: 18px; font-weight: 700; color: #f5f5f4; }
  .logo-sub { font-size: 11px; color: #78716c; font-family: monospace; }
  .nav { display: flex; gap: 6px; }
  .nav-btn { min-height: 44px; padding: 0 14px; border-radius: 8px; border: none; cursor: pointer; font-size: 14px; font-weight: 600; background: transparent; color: #a8a29e; font-family: sans-serif; white-space: nowrap; }
  .nav-btn.active { background: #4ade8022; color: #4ade80; }

  /* ── Layout ── */
  .main { padding: 20px 16px; max-width: 900px; margin: 0 auto; }
  .page { display: none; }
  .page.active { display: block; }

  /* ── Cards ── */
  .card { background: #161616; border: 1px solid #222; border-radius: 14px; padding: 20px; margin-bottom: 16px; }
  .sec-title { font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: #57534e; margin-bottom: 14px; font-family: sans-serif; }
  .sub-head { font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: #4ade8077; margin: 18px 0 10px; padding-bottom: 6px; border-bottom: 1px solid #1f1f1f; font-family: sans-serif; }

  /* ── Stats ── */
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 16px; }
  .stat-card { background: #161616; border: 1px solid #222; border-radius: 12px; padding: 16px; }
  .stat-icon { font-size: 24px; margin-bottom: 6px; }
  .stat-val { font-size: 32px; font-weight: 900; color: #4ade80; font-family: Georgia, serif; }
  .stat-label { font-size: 12px; color: #78716c; font-family: sans-serif; margin-top: 2px; }

  /* ── Buttons ── */
  .btn-green { background: linear-gradient(135deg, #16a34a, #15803d); color: white; border: none; border-radius: 10px; padding: 13px 22px; font-size: 16px; font-weight: 700; cursor: pointer; font-family: sans-serif; min-height: 48px; }
  .btn-green:active { opacity: 0.85; }
  .btn-outline { background: transparent; border: 1px solid #333; border-radius: 8px; color: #a8a29e; padding: 10px 16px; cursor: pointer; font-size: 14px; font-family: sans-serif; min-height: 44px; }
  .btn-danger { background: #7f1d1d33; border: 1px solid #f8717133; border-radius: 8px; color: #f87171; padding: 10px 16px; cursor: pointer; font-size: 14px; font-family: sans-serif; min-height: 44px; }
  .btn-full { width: 100%; margin-top: 10px; padding: 15px 0; font-size: 16px; }
  .btn-sm { padding: 8px 14px; font-size: 13px; min-height: 40px; }

  /* ── Forms ── */
  .form-group { margin-bottom: 14px; }
  .form-label { font-size: 13px; color: #a8a29e; margin-bottom: 5px; display: block; font-family: sans-serif; font-weight: 600; }
  .form-input { width: 100%; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 12px 14px; color: #e7e5e4; font-size: 16px; font-family: sans-serif; min-height: 48px; -webkit-appearance: none; }
  .form-input:focus { outline: none; border-color: #4ade8055; }
  select.form-input { cursor: pointer; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }

  /* ── Search & Customer list ── */
  .search-bar { display: flex; align-items: center; gap: 10px; padding: 12px 16px; background: #161616; border: 1px solid #222; border-radius: 12px; margin-bottom: 14px; }
  .search-bar input { flex: 1; border: none; outline: none; font-size: 16px; background: transparent; color: #e7e5e4; font-family: sans-serif; min-height: 28px; }
  .customer-row { padding: 14px 16px; border-radius: 10px; cursor: pointer; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid transparent; transition: all 0.15s; min-height: 64px; }
  .customer-row:active { background: #1a1a1a; border-color: #2a2a2a; }
  .customer-name { font-weight: 700; color: #f5f5f4; font-size: 17px; }
  .customer-sub { font-size: 13px; color: #78716c; font-family: sans-serif; margin-top: 3px; }

  /* ── Badges ── */
  .badge { display: inline-block; padding: 4px 10px; border-radius: 6px; font-size: 13px; font-weight: 700; font-family: monospace; }
  .badge-green { background: #4ade8018; color: #4ade80; border: 1px solid #4ade8033; }
  .badge-red { background: #f8717118; color: #f87171; border: 1px solid #f8717133; }
  .badge-orange { background: #fb923c18; color: #fb923c; border: 1px solid #fb923c33; }
  .badge-gray { color: #57534e; }

  /* ── Tables ── */
  .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th { padding: 8px 10px; font-weight: 600; border-bottom: 1px solid #222; font-family: sans-serif; font-size: 12px; color: #57534e; text-align: left; }
  th.year-col { text-align: center; color: #a8a29e; font-family: monospace; font-size: 14px; }
  td { padding: 9px 10px; border-bottom: 1px solid #161616; }
  td.center { text-align: center; }
  .section-row td { padding: 12px 10px 5px; color: #4ade8077; font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; font-family: sans-serif; border-bottom: 1px solid #1e1e1e; }
  .metric-label { font-weight: 600; color: #d6d3d1; font-family: sans-serif; font-size: 14px; }
  .ideal-range { color: #57534e; font-size: 12px; font-family: monospace; white-space: nowrap; }

  /* ── Score card ── */
  .score-card { display: flex; align-items: center; gap: 14px; background: #111; border-radius: 12px; padding: 16px 18px; margin-bottom: 16px; }
  .score-pct { font-size: 38px; font-weight: 900; font-family: Georgia, serif; line-height: 1; }
  .score-label { color: #d6d3d1; font-weight: 700; font-size: 15px; font-family: sans-serif; }
  .score-sub { color: #78716c; font-size: 13px; font-family: sans-serif; margin-top: 2px; }

  /* ── Scan options ── */
  .scan-option { display: flex; align-items: center; gap: 16px; padding: 20px; background: #161616; border: 1px solid #222; border-radius: 14px; cursor: pointer; margin-bottom: 14px; transition: all 0.15s; min-height: 80px; }
  .scan-option:active { border-color: #4ade8055; }
  .scan-option.primary { background: linear-gradient(135deg, #16a34a, #15803d); color: #fff; border-color: #16a34a; }
  .scan-option .icon { font-size: 32px; flex-shrink: 0; }
  .scan-option .title { font-size: 18px; font-weight: 700; margin-bottom: 4px; font-family: sans-serif; }
  .scan-option .desc { font-size: 14px; opacity: 0.75; line-height: 1.4; font-family: sans-serif; }

  /* ── Modal ── */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.65); z-index: 200; display: none; align-items: flex-end; justify-content: center; }
  .modal-overlay.visible { display: flex; }
  .modal { background: #1a1a1a; border: 1px solid #333; border-radius: 20px 20px 0 0; padding: 28px 24px; width: 100%; max-width: 540px; max-height: 75vh; overflow-y: auto; }
  .modal h2 { font-size: 20px; font-weight: 700; color: #f5f5f4; margin-bottom: 6px; }
  .modal-range { font-size: 14px; color: #4ade80; margin-bottom: 16px; font-family: monospace; }
  .modal-section { margin-bottom: 16px; }
  .modal-section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #4ade80; margin-bottom: 6px; font-family: sans-serif; }
  .modal-body { font-size: 15px; line-height: 1.65; color: #a8a29e; }
  .modal-close { float: right; background: none; border: none; font-size: 28px; cursor: pointer; color: #78716c; min-width: 44px; min-height: 44px; }

  /* ── Notifications ── */
  .notification { position: fixed; top: 16px; left: 12px; right: 12px; border-radius: 10px; padding: 14px 18px; font-size: 15px; font-weight: 600; z-index: 999; box-shadow: 0 8px 32px #00000088; font-family: sans-serif; display: none; }
  .notification.success { background: #14532d; border: 1px solid #4ade80; color: #bbf7d0; }
  .notification.error { background: #7f1d1d; border: 1px solid #f87171; color: #fca5a5; }

  /* ── Print / Report ── */
  .report-paper { background: white; color: #1a1a1a; border-radius: 12px; padding: 28px; font-family: sans-serif; }
  .report-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px; border-bottom: 3px solid #2d5a1b; padding-bottom: 16px; flex-wrap: wrap; gap: 12px; }
  .report-logo { font-size: 20px; font-weight: 900; color: #2d5a1b; letter-spacing: -1px; line-height: 1.1; }
  .report-logo span { display: block; }
  .report-customer { text-align: right; }
  .report-customer-name { font-size: 18px; font-weight: 700; color: #2d5a1b; }
  .report-customer-sub { font-size: 12px; color: #666; margin-top: 3px; }
  .report-section-title { font-size: 12px; font-weight: 700; color: #2d5a1b; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
  .report-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-bottom: 20px; }
  .report-table th { background: #f0f7ee; padding: 7px 10px; text-align: left; color: #2d5a1b; font-weight: 600; }
  .report-table th.center { text-align: center; }
  .report-table td { padding: 7px 10px; border-bottom: 1px solid #eee; }
  .report-table td.center { text-align: center; font-weight: 700; font-family: monospace; }
  .report-table tr:nth-child(even) td { background: #f9f9f9; }
  .report-footer { margin-top: 24px; padding-top: 16px; border-top: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }

  /* ── Loading / Empty ── */
  .loading { text-align: center; padding: 70px 20px; color: #78716c; font-family: sans-serif; }
  .spinner { display: inline-block; width: 32px; height: 32px; border: 3px solid #333; border-top-color: #4ade80; border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty { text-align: center; padding: 48px 20px; color: #78716c; font-family: sans-serif; }
  .empty-icon { font-size: 44px; margin-bottom: 12px; }

  /* ── Responsive ── */
  @media print {
    .header, .no-print { display: none !important; }
    body { background: white; }
    .main { padding: 0; }
    .report-paper { border-radius: 0; }
  }
  @media (max-width: 600px) {
    .stats-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
    .grid-2 { grid-template-columns: 1fr; }
    .grid-3 { grid-template-columns: 1fr 1fr; }
    .nav-btn { padding: 0 10px; font-size: 13px; }
    .logo-sub { display: none; }
    .main { padding: 16px 12px; }
    .card { padding: 16px; }
  }
</style>
</head>
<body>

<div class="notification" id="notification"></div>

<div class="header">
  <div class="logo">
    <div class="logo-icon">
      <svg width="38" height="38" viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="38" height="38" rx="8" fill="#1a1208"/>
        <path d="M6 28c2-4 5-3 8-5s4-6 7-5 3 4 6 3 5-3 5-3v10H6z" fill="#3d2b1f"/>
        <path d="M6 30c3-2 5-1 8-3s4-4 7-3 3 3 6 2 5-2 5-2v6H6z" fill="#5c3d2e"/>
        <circle cx="12" cy="24" r="1.2" fill="#78716c" opacity="0.5"/>
        <circle cx="22" cy="26" r="0.8" fill="#78716c" opacity="0.4"/>
        <circle cx="28" cy="25" r="1" fill="#78716c" opacity="0.3"/>
        <path d="M19 8v12" stroke="#4ade80" stroke-width="1.8" stroke-linecap="round"/>
        <path d="M19 8c0 0-4 3-5 6" stroke="#4ade80" stroke-width="1.5" stroke-linecap="round" fill="none"/>
        <path d="M19 10c0 0 3 2 4 5" stroke="#4ade80" stroke-width="1.5" stroke-linecap="round" fill="none"/>
        <ellipse cx="14" cy="13" rx="3" ry="4" fill="#4ade80" opacity="0.8" transform="rotate(-20 14 13)"/>
        <ellipse cx="23" cy="14" rx="2.5" ry="3.5" fill="#22c55e" opacity="0.7" transform="rotate(15 23 14)"/>
        <ellipse cx="18" cy="9" rx="2" ry="3" fill="#16a34a" opacity="0.9" transform="rotate(-5 18 9)"/>
      </svg>
    </div>
    <div>
      <div class="logo-text">SoilTracks</div>
      <div class="logo-sub">Lawns Plants & Pests LLC</div>
    </div>
  </div>
  <div class="nav">
    <button class="nav-btn active" onclick="showTab('dashboard')">Dashboard</button>
    <button class="nav-btn" onclick="showTab('add')">+ Add</button>
    <button class="nav-btn" onclick="showTab('report')">Reports</button>
  </div>
</div>

<div class="main" id="content">
  <div class="loading"><div class="spinner"></div><p style="margin-top:12px">Loading...</p></div>
</div>

<div class="modal-overlay" id="info-modal" onclick="closeModal(event)">
  <div class="modal" id="info-modal-body"></div>
</div>

<input type="file" accept="image/*" id="file-input" style="display:none" onchange="handleFileUpload(event)">
<input type="file" accept="image/*" capture="environment" id="camera-input" style="display:none" onchange="handleFileUpload(event)">

<script>
var customers = [];
var samples = [];
var currentView = 'dashboard';
var selectedCustomer = null;
var prefillData = null;

var METRICS = [
  { key:'pH', label:'Soil pH', unit:'', min:6.0, max:7.0, section:'Lab Results',
    desc:'Measures soil acidity or alkalinity. Most nutrients are best available between 6.0–7.0.',
    rec:'If too low, apply limestone. If too high, apply sulfur.' },
  { key:'phosphorus', label:'Phosphorus (P)', unit:'lb/A', min:50, max:100, section:'Lab Results',
    desc:'Drives root development and early establishment. High levels can interfere with zinc and iron uptake.',
    rec:'If deficient, apply phosphate fertilizer. Avoid excess — runoff harms waterways.' },
  { key:'organicMatter', label:'Organic Matter', unit:'%', min:3, max:6, section:'Lab Results',
    desc:'Improves water retention, feeds soil biology, and buffers pH swings.',
    rec:'Top-dress with compost, use organic fertilizers, minimize soil disturbance.' },
  { key:'acidity', label:'Buffer Acidity', unit:'meq/100g', min:0, max:2, section:'Exchangeable Cations',
    desc:'Reserve acidity in soil. Higher values mean more limestone is needed to raise pH.',
    rec:'This value determines your limestone application rate.' },
  { key:'potassium', label:'Potassium (K)', unit:'meq/100g', min:0.15, max:0.40, section:'Exchangeable Cations',
    desc:'Essential for water regulation, disease resistance, and winter hardiness.',
    rec:'If deficient, apply potash (K₂O). Important for stress tolerance.' },
  { key:'magnesium', label:'Magnesium (Mg)', unit:'meq/100g', min:0.5, max:2.5, section:'Exchangeable Cations',
    desc:'The central atom in every chlorophyll molecule. Plants cannot photosynthesize without it.',
    rec:'If deficient, apply dolomitic limestone or Epsom salt.' },
  { key:'calcium', label:'Calcium (Ca)', unit:'meq/100g', min:5, max:15, section:'Exchangeable Cations',
    desc:'Builds strong cell walls and improves soil structure. Primary component of limestone.',
    rec:'If deficient, apply calcitic or dolomitic limestone.' },
  { key:'cec', label:'CEC', unit:'meq/100g', min:10, max:20, section:'Exchangeable Cations', infoOnly:true,
    desc:'Total ability of soil to hold nutrient ions. Higher means less leaching risk.',
    rec:'CEC is informational. Improve it by adding organic matter like compost.' },
  { key:'satK', label:'K Saturation', unit:'%', min:2, max:5, section:'% Saturation of CEC',
    desc:'Percentage of CEC occupied by potassium. Too high blocks magnesium and calcium uptake.',
    rec:'If too low, apply potassium. If too high relative to Mg, focus on balancing.' },
  { key:'satMg', label:'Mg Saturation', unit:'%', min:10, max:20, section:'% Saturation of CEC',
    desc:'Percentage of CEC occupied by magnesium. Low levels cause chlorophyll deficiency.',
    rec:'If deficient, apply dolomitic limestone or Epsom salt.' },
  { key:'satCa', label:'Ca Saturation', unit:'%', min:60, max:80, section:'% Saturation of CEC',
    desc:'Percentage of CEC occupied by calcium. Low Ca usually signals acidic soil needing lime.',
    rec:'If deficient, apply limestone. Calcium and pH are closely linked.' }
];

var LAB_SECTIONS = {
  'Lab Results': ['pH','phosphorus','organicMatter'],
  'Exchangeable Cations': ['acidity','potassium','magnesium','calcium','cec'],
  '% Saturation of CEC': ['satK','satMg','satCa']
};

var REC_ROWS = [
  { key:'limestoneLbs', label:'🪨 Limestone', note:'Raises pH. Split if over 100 lb. Aerate first.' },
  { key:'recN', label:'🌿 Nitrogen (N)', note:'Split into multiple apps through the season.' },
  { key:'recP', label:'🌱 Phosphorus (P₂O₅)', note:'Only apply what the test recommends.' },
  { key:'recK', label:'💧 Potassium (K₂O)', note:'Important for winter hardiness.' }
];

// ══════════════════════════════════════════════════════
// Init
// ══════════════════════════════════════════════════════
window.onload = function() {
  var timeout = setTimeout(function() {
    setContent('<div class="card" style="background:#1a1000;border-color:#fb923c;padding:20px;line-height:1.7;font-family:sans-serif">'
      + '<div style="font-size:16px;font-weight:700;color:#fb923c;margin-bottom:10px">⚠️ Could not connect</div>'
      + '<p style="font-size:13px;color:#a8a29e;margin-bottom:12px">This is usually an authorization issue. In the Apps Script editor, select <b>testConnection</b> from the function dropdown and click Run. Approve permissions, then refresh this page.</p>'
      + '<button class="btn-green" onclick="location.reload()">↺ Retry</button></div>');
  }, 12000);

  google.script.run
    .withSuccessHandler(function(result) {
      clearTimeout(timeout);
      if (!result.success) {
        setContent('<div class="card" style="color:#f87171;font-family:sans-serif;padding:20px"><b>Error:</b> ' + esc(result.error) + '</div>');
      } else { loadDashboard(); }
    })
    .withFailureHandler(function(err) {
      clearTimeout(timeout);
      setContent('<div class="card" style="color:#f87171;font-family:sans-serif;padding:20px"><b>Script error:</b> ' + esc(err.message || String(err))
        + '<br><button class="btn-green" style="margin-top:12px" onclick="location.reload()">↺ Retry</button></div>');
    })
    .testConnection();
};

// ══════════════════════════════════════════════════════
// Data
// ══════════════════════════════════════════════════════
function loadDashboard() {
  setContent('<div class="loading"><div class="spinner"></div><p style="margin-top:12px">Loading...</p></div>');
  google.script.run
    .withSuccessHandler(function(data) {
      customers = data.customers || [];
      samples = data.samples || [];
      renderDashboard(data);
    })
    .withFailureHandler(function(err) { showError(err); })
    .getDashboardData();
}

// ══════════════════════════════════════════════════════
// Nav
// ══════════════════════════════════════════════════════
function showTab(tab) {
  currentView = tab;
  selectedCustomer = null;
  document.querySelectorAll('.nav-btn').forEach(function(b, i) {
    b.classList.toggle('active', ['dashboard','add','report'][i] === tab);
  });
  if (tab === 'dashboard') loadDashboard();
  else if (tab === 'add') renderAddSample();
  else if (tab === 'report') renderReportPage();
}

function setContent(html) { document.getElementById('content').innerHTML = html; }

// ══════════════════════════════════════════════════════
// Dashboard
// ══════════════════════════════════════════════════════
function renderDashboard(data) {
  var d = data || {};
  var html = '<div style="margin-bottom:20px">'
    + '<div style="font-size:22px;font-weight:700;color:#f5f5f4;margin-bottom:4px">Soil Data Overview</div>'
    + '<div style="color:#78716c;font-size:13px;font-family:sans-serif">'
    + (d.customerCount||0)+' customers · '+(d.sampleCount||0)+' samples · '+(d.yearsCount||0)+' years of data</div></div>';

  html += '<div class="stats-grid">'
    + '<div class="stat-card"><div class="stat-icon">👨‍🌾</div><div class="stat-val">'+(d.customerCount||0)+'</div><div class="stat-label">Customers</div></div>'
    + '<div class="stat-card"><div class="stat-icon">🧪</div><div class="stat-val">'+(d.sampleCount||0)+'</div><div class="stat-label">Total Samples</div></div>'
    + '<div class="stat-card"><div class="stat-icon">📅</div><div class="stat-val">'+(d.yearsCount||0)+'</div><div class="stat-label">Years of Data</div></div>'
    + '</div>';

  if (d.improvementScore !== null && d.improvementScore !== undefined) {
    var color = d.improvementScore >= 70 ? '#4ade80' : d.improvementScore >= 40 ? '#fb923c' : '#f87171';
    html += '<div class="score-card" style="border:1px solid '+color+'33">'
      + '<div class="score-pct" style="color:'+color+'">'+d.improvementScore+'%</div>'
      + '<div><div class="score-label">Average Improvement</div><div class="score-sub">Year-over-year soil health trend</div></div></div>';
  }

  if (d.topIssues && d.topIssues.length > 0) {
    html += '<div class="card"><div class="sec-title">Common Issues</div>';
    d.topIssues.forEach(function(issue) {
      html += '<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #1e1e1e">'
        + '<span style="font-family:sans-serif;font-size:13px;color:#d6d3d1">'+esc(issue.label)+'</span>'
        + '<span class="badge badge-red">'+issue.count+' out of range</span></div>';
    });
    html += '</div>';
  }

  html += '<div class="card"><div class="sec-title">Customers</div>';
  html += '<div class="search-bar no-print"><span style="color:#57534e">🔍</span><input id="cust-search" placeholder="Search customers..." oninput="filterCustomers()"></div>';
  html += '<div id="customer-list">' + renderCustomerList(customers) + '</div></div>';

function renderCustomerList(list) {
  if (list.length === 0) return '<div class="empty"><div class="empty-icon">🌱</div><div style="font-size:15px;font-weight:700;color:#f5f5f4;margin-bottom:4px">No customers yet</div><div style="font-size:13px">Add your first sample to get started.</div></div>';
  var html = '';
  list.forEach(function(c) {
    var count = samples.filter(function(s){ return s.customerId === c.id; }).length;
    var yrs = [... new Set(samples.filter(function(s){ return s.customerId === c.id; }).map(function(s){ return s.year; }))].sort().join(', ');
    html += '<div class="customer-row" onclick="openCustomer(\''+c.id+'\')">'
      + '<div><div class="customer-name">'+esc(c.name)+'</div>'
      + '<div class="customer-sub">'+(c.field?esc(c.field)+' · ':'')+count+' sample'+(count!==1?'s':'')+(yrs?' · '+yrs:'')+'</div></div>'
      + '<div style="color:#78716c;font-size:20px">›</div></div>';
  });
  return html;
}

function filterCustomers() {
  var q = document.getElementById('cust-search').value.toLowerCase();
  var filtered = customers.filter(function(c) {
    return c.name.toLowerCase().includes(q) || (c.field||'').toLowerCase().includes(q);

  document.getElementById('customer-list').innerHTML = renderCustomerList(filtered);
}

function openCustomer(id) {
  selectedCustomer = customers.find(function(c){ return c.id === id; });
  if (!selectedCustomer) return;
  currentView = 'customer';
  document.querySelectorAll('.nav-btn').forEach(function(b){ b.classList.remove('active'); });

  var c = selectedCustomer;
  var sorted = samples.filter(function(s){ return s.customerId === c.id; }).sort(function(a,b){ return a.year - b.year; });

  var imp = 0, total = 0;
  if (sorted.length >= 2) {
    var prev = sorted[sorted.length - 2], curr = sorted[sorted.length - 1];
    METRICS.forEach(function(m) {
      if (m.infoOnly) return;
      var pv = parseFloat(prev[m.key]), cv = parseFloat(curr[m.key]);
      if (isNaN(pv) || isNaN(cv)) return;
      total++;
      var mid = (m.min + m.max) / 2;
      var cs = cv >= m.min && cv <= m.max;
      var ps = pv >= m.min && pv <= m.max;
      if (cs) { imp++; } else if (!ps && Math.abs(cv-mid) < Math.abs(pv-mid)) { imp++; }
    });
  }

  var html = '<div style="display:flex;align-items:center;gap:12px;margin-bottom:18px;flex-wrap:wrap" class="no-print">'
    + '<button class="btn-outline" onclick="showTab(\'dashboard\')">← Back</button>'
    + '<div style="font-size:20px;font-weight:700;color:#f5f5f4;flex:1">'+esc(c.name)+'</div>'
    + '<button class="btn-outline btn-sm" onclick="showReportFor(\''+c.id+'\')">📄 Report</button>'
    + '<button class="btn-outline btn-sm" onclick="addSampleFor(\''+c.id+'\')">+ Sample</button>'
    + '<button class="btn-danger btn-sm" onclick="deleteCustomer(\''+c.id+'\')">Delete</button></div>';

  if (c.field || c.address || c.email || c.phone) {
    html += '<div class="card" style="padding:12px 16px;margin-bottom:12px">';
    if (c.field)   html += '<div style="font-size:13px;color:#a8a29e;font-family:sans-serif">'+esc(c.field)+'</div>';
    if (c.address) html += '<div style="font-size:12px;color:#57534e;font-family:sans-serif">'+esc(c.address)+(c.city?', '+esc(c.city):'')+'</div>';
    if (c.email)   html += '<div style="font-size:12px;color:#57534e;font-family:sans-serif">'+esc(c.email)+'</div>';
    if (c.phone)   html += '<div style="font-size:12px;color:#57534e;font-family:sans-serif">'+esc(c.phone)+'</div>';
    html += '</div>';
  }

  if (total > 0) {
    var pct = Math.round((imp/total)*100);
    var clr = pct >= 70 ? '#4ade80' : pct >= 40 ? '#fb923c' : '#f87171';
    html += '<div class="score-card" style="border:1px solid '+clr+'33;margin-bottom:12px">'
      + '<div class="score-pct" style="color:'+clr+'">'+pct+'%</div>'
      + '<div><div class="score-label">Year-over-Year Improvement</div>'
      + '<div class="score-sub">Based on last two samples</div></div></div>';
  }

  if (sorted.length === 0) {
    html += '<div class="empty"><div class="empty-icon">🧪</div><div style="font-size:15px;font-weight:700;color:#f5f5f4;margin-bottom:4px">No samples yet</div>'
      + '<div style="font-size:13px;margin-bottom:16px">Add a soil sample to start tracking.</div>'
      + '<button class="btn-green" onclick="addSampleFor(\''+c.id+'\')">+ Add Sample</button></div>';
    setContent(html);
    return;
  }

  html += '<div class="card"><div class="sec-title">Limestone & Nutrient Recommendations</div><div class="table-wrap"><table>';
  html += '<thead><tr><th>Item</th>';
  sorted.forEach(function(s){ html += '<th class="year-col">'+s.year+'</th>'; });
  html += '<th>Notes</th></tr></thead><tbody>';
  REC_ROWS.forEach(function(row) {
    html += '<tr><td style="font-weight:600;color:#d6d3d1;white-space:nowrap;font-family:sans-serif;font-size:13px">'+row.label+'</td>';
    sorted.forEach(function(s) { html += '<td class="center">'+recBadge(s[row.key])+'</td>'; });
    html += '<td style="color:#78716c;font-size:11px;font-family:sans-serif;max-width:180px;line-height:1.5">'+row.note+'</td></tr>';
  });
  html += '</tbody></table></div></div>';

  html += '<div class="card"><div class="sec-title">Lab Results — Year over Year</div><div class="table-wrap"><table>';
  html += '<thead><tr><th>Metric</th>';
  sorted.forEach(function(s){ html += '<th class="year-col">'+s.year+'</th>'; });
  html += '<th>Ideal</th></tr></thead><tbody>';
  Object.entries(LAB_SECTIONS).forEach(function(entry) {
    var section = entry[0], keys = entry[1];
    html += '<tr class="section-row"><td colspan="'+(sorted.length+2)+'">'+section+'</td></tr>';
    keys.forEach(function(key) {
      var m = METRICS.find(function(x){ return x.key === key; });
      if (!m) return;
      html += '<tr><td style="min-width:130px"><div class="metric-label">'+m.label+'</div>'
        + '<button style="font-size:10px;color:#4ade8066;cursor:pointer;font-family:sans-serif;text-decoration:underline dotted;border:none;background:none;padding:0" onclick="showInfoModal(\''+m.key+'\')">what is this?</button></td>';
      sorted.forEach(function(s) { html += '<td class="center">'+statusBadge(s[key], m)+'</td>'; });
      html += '<td class="ideal-range">'+m.min+'–'+m.max+(m.unit?' '+m.unit:'')+'</td></tr>';
    });
  });
  html += '</tbody></table></div></div>';

  html += '<div class="card no-print"><div class="sec-title">Sample History</div>';
  sorted.slice().reverse().forEach(function(s) {
    html += '<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #1e1e1e">'
      + '<span style="background:#4ade8018;color:#4ade80;padding:4px 10px;border-radius:6px;font-weight:700;font-size:13px;font-family:monospace">'+s.year+'</span>'
      + '<span style="flex:1;font-size:12px;color:#78716c;font-family:sans-serif">'+formatDate(s.createdAt)+'</span>'
      + '<button class="btn-danger btn-sm" onclick="deleteSample(\''+s.id+'\','+s.year+')">Delete</button></div>';
  });
  html += '</div>';
  setContent(html);
}

// ══════════════════════════════════════════════════════
function handleFileUpload(event) {
  var file = event.target.files[0];
  if (!file) return;
  event.target.value = '';

  setContent('<div class="loading"><div class="spinner"></div><p style="margin-top:12px;font-size:15px">🤖 Reading soil report...</p><p style="color:#57534e;font-size:12px;margin-top:6px">Step 1 of 2 — Compressing image...</p></div>');

  compressToLimit(file, 65000, function(base64) {
    sendToExtraction(base64, 'image/jpeg');
  });
}

function sendToExtraction(base64, mimeType) {
  var startTime = Date.now();
  var done = false;

  function elapsedSec() { return Math.floor((Date.now() - startTime) / 1000); }

  function updateTimer() {
    var el = document.getElementById('ai-timer');
    if (el) el.textContent = elapsedSec() + 's';
  }

  function showExtractionScreen() {
    setContent(
      '<div class="loading">' +
        '<div class="spinner" style="width:40px;height:40px;border-width:4px"></div>' +
        '<p style="margin-top:16px;font-size:20px;font-weight:700;color:#f5f5f4">🤖 Reading Soil Report</p>' +
        '<p style="color:#78716c;font-size:14px;margin-top:8px;font-family:sans-serif">AI is analyzing your image...</p>' +
        '<p style="color:#3d3d3d;font-size:13px;margin-top:6px;font-family:monospace"><span id="ai-timer">0s</span> elapsed — usually 20–40 sec</p>' +
        '<div style="margin-top:28px">' +
          '<button class="btn-outline" style="font-size:15px;padding:12px 24px" onclick="skipExtraction()">✏️ Skip — Enter Manually</button>' +
        '</div>' +
        '<p style="color:#3d3d3d;font-size:11px;margin-top:16px;font-family:sans-serif">You can enter values by hand<br>while AI tries in the background</p>' +
      '</div>'
    );
  }

  window.skipExtraction = function() {
    if (done) return;
    done = true;
    clearTimeout(hardTimeout);
    clearInterval(timerInterval);
    prefillData = null;
    renderSampleForm();
  };

  showExtractionScreen();
  var timerInterval = setInterval(updateTimer, 1000);

  var hardTimeout = setTimeout(function() {
    if (done) return;
    done = true;
    clearInterval(timerInterval);
    notify('AI timed out after ' + elapsedSec() + 's — enter values manually.', 'error');
    prefillData = null;
    renderSampleForm();
  }, 90000);

  function handleResult(result) {
    if (done) return;
    done = true;
    clearTimeout(hardTimeout);
    clearInterval(timerInterval);
    if (result && result.success && result.data) {
      prefillData = result.data;
      prefillData._aiExtracted = true;
      if (prefillData.CustomerName) {
        var aiName = prefillData.CustomerName.toLowerCase().trim();
        var match = customers.find(function(c) {
          return c.name.toLowerCase().trim() === aiName
            || c.name.toLowerCase().includes(aiName)
            || aiName.includes(c.name.toLowerCase().trim());
        });
        if (match) {
          prefillData.customerId = match.id;
          prefillData._matchedCustomer = match.name;
        }
      }
      notify('✅ Data extracted in ' + elapsedSec() + 's! Review and save below.');
    } else {
      notify('Could not extract: ' + ((result && result.error) || 'Unknown error') + ' — fill in manually.', 'error');
      prefillData = null;
    }
    renderSampleForm();
  }

  function handleError(err) {
    if (done) return;
    done = true;
    clearTimeout(hardTimeout);
    clearInterval(timerInterval);
    notify('Error after ' + elapsedSec() + 's: ' + (err.message || String(err)), 'error');
    prefillData = null;
    renderSampleForm();
  }

  google.script.run
    .withSuccessHandler(handleResult)
    .withFailureHandler(handleError)
    .extractSoilData(base64, mimeType || 'image/jpeg');
}

function compressToLimit(file, maxBase64Chars, callback) {
  var reader = new FileReader();
  reader.onload = function(e) {
    var img = new Image();
    img.onload = function() {
      // Try progressively smaller sizes and quality until under the limit
      var attempts = [
        { size: 600, quality: 0.5 },
        { size: 500, quality: 0.4 },
        { size: 400, quality: 0.35 },
        { size: 300, quality: 0.3 },
        { size: 250, quality: 0.25 },
        { size: 200, quality: 0.2 },
        { size: 150, quality: 0.15 }
      ];

      var canvas = document.createElement('canvas');
      var ctx = canvas.getContext('2d');
      var lastBase64 = null;

      for (var i = 0; i < attempts.length; i++) {
        var MAX = attempts[i].size;
        var q   = attempts[i].quality;
        var w = img.width, h = img.height;
        if (w > MAX || h > MAX) {
          if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
          else       { w = Math.round(w * MAX / h); h = MAX; }
        }
        canvas.width = w;
        canvas.height = h;
        ctx.drawImage(img, 0, 0, w, h);
        var dataUrl = canvas.toDataURL('image/jpeg', q);
        lastBase64 = dataUrl.split(',')[1];
        if (lastBase64.length <= maxBase64Chars) break;
      }

      callback(lastBase64);
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function saveSampleForm() {
  var custId = document.getElementById('s-customer').value;
  var year = parseInt(document.getElementById('s-year').value, 10);
  if (!custId) { notify('Please select a customer.', 'error'); return; }
  if (isNaN(year)) { notify('Please enter a valid year.', 'error'); return; }

  var data = { customerId: custId, year: year };
  METRICS.forEach(function(m) {
    var v = document.getElementById('s-'+m.key).value.trim();
    data[m.key] = v === '' ? undefined : parseFloat(v);
  });
  data.limestoneLbs = document.getElementById('s-limestoneLbs').value || undefined;
  data.recN = document.getElementById('s-recN').value.trim() || undefined;
  data.recP = document.getElementById('s-recP').value.trim() || undefined;
  data.recK = document.getElementById('s-recK').value.trim() || undefined;

  google.script.run
    .withSuccessHandler(function(result) {
      data.id = result.id;
      data.createdAt = new Date().toISOString();
      samples.push(data);
      prefillData = null;
      notify('Sample saved!');
      if (selectedCustomer) { openCustomer(selectedCustomer.id); }
      else { showTab('dashboard'); }
    })
    .withFailureHandler(function(err) { notify('Could not save: '+(err.message||err), 'error'); })
    .saveSample(data);
}

function deleteCustomer(id) {
  if (!confirm('Delete this customer and all their samples? This cannot be undone.')) return;
  google.script.run
    .withSuccessHandler(function() {
      customers = customers.filter(function(c){ return c.id !== id; });
      samples = samples.filter(function(s){ return s.customerId !== id; });
      notify('Customer deleted.');
      showTab('dashboard');
    })
    .withFailureHandler(function(err) { notify('Error: '+(err.message||err), 'error'); })
    .deleteCustomer(id);
}

function deleteSample(id, year) {
  if (!confirm('Delete the '+year+' sample? This cannot be undone.')) return;
  google.script.run
    .withSuccessHandler(function() {
      samples = samples.filter(function(s){ return s.id !== id; });
      notify('Sample deleted.');
      if (selectedCustomer) openCustomer(selectedCustomer.id);
    })
    .withFailureHandler(function(err) { notify('Error: '+(err.message||err), 'error'); })
    .deleteSample(id);
}

function showReportFor(id) {
  showTab('report');
  setTimeout(function() {
    var sel = document.getElementById('report-select');
    if (sel) { sel.value = id; renderReport(); }
  }, 100);
}

function renderReport() {
  var id = document.getElementById('report-select').value;
  var output = document.getElementById('report-output');
  if (!id) { output.innerHTML = ''; return; }

  var c = customers.find(function(x){ return x.id === id; });
  var sorted = samples.filter(function(s){ return s.customerId === id; }).sort(function(a,b){ return a.year - b.year; });
  if (!c || sorted.length === 0) {
    output.innerHTML = '<div class="card" style="color:#78716c;font-family:sans-serif">No samples found.</div>';
    return;
  }

  var html = '<div class="report-paper">'
    + '<div class="report-header"><div>'
    + '<div class="report-logo"><span>LAWNS</span><span>PLANTS</span><span>&amp; PESTS</span></div>'
    + '<div style="font-size:11px;color:#666;margin-top:6px">Soil Health Report</div></div>'
    + '<div class="report-customer"><div class="report-customer-name">'+esc(c.name)+'</div>'
    + (c.field?'<div class="report-customer-sub">'+esc(c.field)+'</div>':'')
    + (c.address?'<div class="report-customer-sub">'+esc(c.address)+(c.city?', '+esc(c.city):'')+'</div>':'')
    + '<div class="report-customer-sub" style="margin-top:4px;color:#999">Generated: '+new Date().toLocaleDateString()+'</div>'
    + '</div></div>';

  html += '<div style="margin-bottom:20px"><div class="report-section-title">Limestone & Nutrient Recommendations</div>'
    + '<table class="report-table"><thead><tr><th>Item</th>';
  sorted.forEach(function(s){ html += '<th class="center">'+s.year+'</th>'; });
  html += '</tr></thead><tbody>';
  [{key:'limestoneLbs',label:'Limestone (lb/1000 ft²)'},{key:'recN',label:'Nitrogen (N)'},{key:'recP',label:'Phosphorus (P₂O₅)'},{key:'recK',label:'Potassium (K₂O)'}].forEach(function(row) {
    html += '<tr><td style="font-weight:600">'+row.label+'</td>';
    sorted.forEach(function(s) {
      var v = s[row.key];
      var isNone = !v || String(v).toLowerCase() === 'none' || v === '0';
      html += '<td class="center" style="color:'+(isNone?'#16a34a':'#d97706')+'">'+(v||'None')+'</td>';
    });
    html += '</tr>';
  });
  html += '</tbody></table></div>';

  html += '<div><div class="report-section-title">Soil Test Results</div>'
    + '<table class="report-table"><thead><tr><th>Metric</th><th>Ideal Range</th>';
  sorted.forEach(function(s){ html += '<th class="center">'+s.year+'</th>'; });
  html += '</tr></thead><tbody>';
  METRICS.forEach(function(m) {
    html += '<tr><td style="font-weight:600">'+m.label+'</td>'
      + '<td style="color:#666;font-family:monospace;font-size:11px">'+m.min+'–'+m.max+(m.unit?' '+m.unit:'')+'</td>';
    sorted.forEach(function(s) {
      var v = parseFloat(s[m.key]);
      var clr = isNaN(v) ? '#999' : (v >= m.min && v <= m.max) ? '#16a34a' : v < m.min ? '#dc2626' : '#d97706';
      html += '<td class="center" style="color:'+clr+'">'+(s[m.key]||'—')+'</td>';
    });
    html += '</tr>';
  });
  html += '</tbody></table></div>';

  html += '<div class="report-footer">'
    + '<div style="font-size:11px;color:#999">🟢 Optimal &nbsp; 🟠 Above optimal &nbsp; 🔴 Below optimal</div>'
    + '<div style="font-size:12px;color:#2d5a1b;font-weight:700">Lawns Plants & Pests LLC</div></div></div>';
  output.innerHTML = html;
}

// ══════════════════════════════════════════════════════
// Info Modal
// ══════════════════════════════════════════════════════
function showInfoModal(key) {
  var m = METRICS.find(function(x){ return x.key === key; });
  if (!m) return;
  var html = '<button class="modal-close" onclick="document.getElementById(\'info-modal\').classList.remove(\'visible\')">×</button>'
    + '<h2>'+m.label+'</h2>'
    + '<div class="modal-range">Optimal: '+m.min+'–'+m.max+(m.unit?' '+m.unit:'')+'</div>'
    + '<div class="modal-section"><div class="modal-section-title">What is it?</div><div class="modal-body">'+m.desc+'</div></div>'
    + '<div class="modal-section"><div class="modal-section-title">What to do</div><div class="modal-body">'+m.rec+'</div></div>';
  document.getElementById('info-modal-body').innerHTML = html;
  document.getElementById('info-modal').classList.add('visible');
}

function closeModal(event) {
  if (event.target === document.getElementById('info-modal')) {
    document.getElementById('info-modal').classList.remove('visible');
  }
}

// ══════════════════════════════════════════════════════
// Helpers
// ══════════════════════════════════════════════════════
function statusBadge(value, m) {
  if (value == null || value === '' || value === undefined) return '<span class="badge-gray">—</span>';
  var v = parseFloat(value);
  if (isNaN(v)) return '<span class="badge-gray">—</span>';
  var cls = (v >= m.min && v <= m.max) ? 'badge-green' : v < m.min ? 'badge-red' : 'badge-orange';
  return '<span class="badge '+cls+'">'+value+(m.unit?' '+m.unit:'')+'</span>';
}

function recBadge(val) {
  if (!val || val === undefined) return '<span class="badge-gray">—</span>';
  var isNone = String(val).toLowerCase() === 'none' || val === '0' || val === '';
  return '<span class="badge '+(isNone?'badge-green':'badge-orange')+'">'+(isNone?'None':val)+'</span>';
}

function notify(msg, type) {
  var el = document.getElementById('notification');
  el.textContent = msg;
  el.className = 'notification ' + (type || 'success');
  el.style.display = 'block';
  setTimeout(function(){ el.style.display = 'none'; }, 5000);
}

function showError(err) {
  setContent('<div class="card" style="color:#f87171;font-family:sans-serif"><b>Error:</b> '+(err.message||err)+'</div>');
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function formatDate(iso) {
  if (!iso) return '';
  try { return new Date(iso).toLocaleDateString(); } catch(e) { return iso; }
}

function getVal(obj, key, fallback) {
  var v = obj[key];
  if (v === null || v === undefined || v === '' || v === 'null') return fallback !== undefined ? fallback : '';
  return String(v);
}
