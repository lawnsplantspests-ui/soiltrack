<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>SoilTracks - Lawns Plants &amp; Pests</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0c0c0c; color: #e7e5e4; font-family: Georgia, serif; min-height: 100vh; font-size: 16px; }

  /* Header */
  .header { background: #111; border-bottom: 1px solid #292524; padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; gap: 10px; }
  .logo { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .logo-icon { width: 40px; height: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; overflow: hidden; }
  .logo-text { font-size: 18px; font-weight: 700; color: #f5f5f4; }
  .logo-sub { font-size: 11px; color: #78716c; font-family: monospace; }
  .nav { display: flex; gap: 4px; flex-wrap: wrap; }
  .nav-btn { min-height: 44px; padding: 0 12px; border-radius: 8px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; background: transparent; color: #a8a29e; font-family: sans-serif; white-space: nowrap; }
  .nav-btn.active { background: #4ade8022; color: #4ade80; }
  .nav-btn:hover { background: #1a1a1a; }

  /* Layout */
  .main { padding: 20px 16px; max-width: 900px; margin: 0 auto; }
  .page { display: none; }
  .page.active { display: block; }

  /* Cards */
  .card { background: #161616; border: 1px solid #222; border-radius: 14px; padding: 20px; margin-bottom: 16px; }
  .sec-title { font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: #57534e; margin-bottom: 14px; font-family: sans-serif; }
  .sub-head { font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: #4ade8077; margin: 18px 0 10px; padding-bottom: 6px; border-bottom: 1px solid #1f1f1f; font-family: sans-serif; }
  .page-title { font-size: 22px; font-weight: 700; color: #f5f5f4; margin-bottom: 4px; }
  .page-sub { color: #78716c; font-size: 13px; font-family: sans-serif; margin-bottom: 20px; }

  /* Stats */
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 16px; }
  .stat-card { background: #161616; border: 1px solid #222; border-radius: 12px; padding: 16px; }
  .stat-icon { font-size: 24px; margin-bottom: 6px; }
  .stat-val { font-size: 32px; font-weight: 900; color: #4ade80; font-family: Georgia, serif; }
  .stat-label { font-size: 12px; color: #78716c; font-family: sans-serif; margin-top: 2px; }

  /* Buttons */
  .btn-green { background: linear-gradient(135deg, #16a34a, #15803d); color: white; border: none; border-radius: 10px; padding: 13px 22px; font-size: 16px; font-weight: 700; cursor: pointer; font-family: sans-serif; min-height: 48px; }
  .btn-green:hover { opacity: 0.9; }
  .btn-green:active { opacity: 0.8; }
  .btn-outline { background: transparent; border: 1px solid #333; border-radius: 8px; color: #a8a29e; padding: 10px 16px; cursor: pointer; font-size: 14px; font-family: sans-serif; min-height: 44px; }
  .btn-outline:hover { border-color: #555; color: #e7e5e4; }
  .btn-danger { background: #7f1d1d33; border: 1px solid #f8717133; border-radius: 8px; color: #f87171; padding: 10px 16px; cursor: pointer; font-size: 14px; font-family: sans-serif; min-height: 44px; }
  .btn-danger:hover { background: #7f1d1d55; }
  .btn-full { width: 100%; margin-top: 10px; padding: 15px 0; font-size: 16px; }
  .btn-sm { padding: 8px 14px; font-size: 13px; min-height: 40px; }
  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; }

  /* Forms */
  .form-group { margin-bottom: 14px; }
  .form-label { font-size: 13px; color: #a8a29e; margin-bottom: 5px; display: block; font-family: sans-serif; font-weight: 600; }
  .form-input { width: 100%; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 12px 14px; color: #e7e5e4; font-size: 16px; font-family: sans-serif; min-height: 48px; -webkit-appearance: none; }
  .form-input:focus { outline: none; border-color: #4ade8055; }
  select.form-input { cursor: pointer; }
  textarea.form-input { min-height: 80px; resize: vertical; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }

  /* Search & Customer list */
  .search-bar { display: flex; align-items: center; gap: 10px; padding: 12px 16px; background: #161616; border: 1px solid #222; border-radius: 12px; margin-bottom: 14px; }
  .search-bar input { flex: 1; border: none; outline: none; font-size: 16px; background: transparent; color: #e7e5e4; font-family: sans-serif; min-height: 28px; }
  .customer-row { padding: 14px 16px; border-radius: 10px; cursor: pointer; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid transparent; transition: all 0.15s; min-height: 64px; }
  .customer-row:hover { background: #1a1a1a; border-color: #2a2a2a; }
  .customer-row:active { background: #1e1e1e; }
  .customer-name { font-weight: 700; color: #f5f5f4; font-size: 17px; }
  .customer-sub { font-size: 13px; color: #78716c; font-family: sans-serif; margin-top: 3px; }

  /* Badges */
  .badge { display: inline-block; padding: 4px 10px; border-radius: 6px; font-size: 13px; font-weight: 700; font-family: monospace; }
  .badge-green { background: #4ade8018; color: #4ade80; border: 1px solid #4ade8033; }
  .badge-red { background: #f8717118; color: #f87171; border: 1px solid #f8717133; }
  .badge-orange { background: #fb923c18; color: #fb923c; border: 1px solid #fb923c33; }
  .badge-gray { color: #57534e; }

  /* Tables */
  .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th { padding: 8px 10px; font-weight: 600; border-bottom: 1px solid #222; font-family: sans-serif; font-size: 12px; color: #57534e; text-align: left; }
  th.year-col { text-align: center; color: #a8a29e; font-family: monospace; font-size: 14px; }
  td { padding: 9px 10px; border-bottom: 1px solid #161616; }
  td.center { text-align: center; }
  .section-row td { padding: 12px 10px 5px; color: #4ade8077; font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; font-family: sans-serif; border-bottom: 1px solid #1e1e1e; }
  .metric-label { font-weight: 600; color: #d6d3d1; font-family: sans-serif; font-size: 14px; }
  .ideal-range { color: #57534e; font-size: 12px; font-family: monospace; white-space: nowrap; }

  /* Score card */
  .score-card { display: flex; align-items: center; gap: 14px; background: #111; border-radius: 12px; padding: 16px 18px; margin-bottom: 16px; border: 1px solid #222; }
  .score-pct { font-size: 38px; font-weight: 900; font-family: Georgia, serif; line-height: 1; }
  .score-label { color: #d6d3d1; font-weight: 700; font-size: 15px; font-family: sans-serif; }
  .score-sub { color: #78716c; font-size: 13px; font-family: sans-serif; margin-top: 2px; }

  /* Scan / upload */
  .scan-option { display: flex; align-items: center; gap: 16px; padding: 20px; background: #161616; border: 1px solid #222; border-radius: 14px; cursor: pointer; margin-bottom: 14px; transition: all 0.15s; min-height: 80px; }
  .scan-option:hover { border-color: #4ade8044; }
  .scan-option.primary { background: linear-gradient(135deg, #16a34a, #15803d); color: #fff; border-color: #16a34a; }
  .scan-option .icon { font-size: 32px; flex-shrink: 0; }
  .scan-option .title { font-size: 18px; font-weight: 700; margin-bottom: 4px; font-family: sans-serif; }
  .scan-option .desc { font-size: 14px; opacity: 0.75; line-height: 1.4; font-family: sans-serif; }
  .drop-zone { border: 2px dashed #333; border-radius: 14px; padding: 40px 20px; text-align: center; cursor: pointer; transition: all 0.2s; margin-bottom: 16px; font-family: sans-serif; }
  .drop-zone:hover, .drop-zone.dragover { border-color: #4ade80; background: #4ade8008; }
  .drop-zone .dz-icon { font-size: 40px; margin-bottom: 10px; }
  .drop-zone .dz-title { font-size: 16px; font-weight: 700; color: #d6d3d1; margin-bottom: 4px; }
  .drop-zone .dz-sub { font-size: 13px; color: #78716c; }
  .preview-img { max-width: 100%; max-height: 200px; border-radius: 10px; margin: 10px 0; display: block; }

  /* Modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.65); z-index: 200; display: none; align-items: flex-end; justify-content: center; }
  .modal-overlay.visible { display: flex; }
  .modal { background: #1a1a1a; border: 1px solid #333; border-radius: 20px 20px 0 0; padding: 28px 24px; width: 100%; max-width: 540px; max-height: 80vh; overflow-y: auto; }
  .modal h2 { font-size: 20px; font-weight: 700; color: #f5f5f4; margin-bottom: 6px; }
  .modal-range { font-size: 14px; color: #4ade80; margin-bottom: 16px; font-family: monospace; }
  .modal-section { margin-bottom: 16px; }
  .modal-section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #4ade80; margin-bottom: 6px; font-family: sans-serif; }
  .modal-body { font-size: 15px; line-height: 1.65; color: #a8a29e; }
  .modal-close { float: right; background: none; border: none; font-size: 28px; cursor: pointer; color: #78716c; min-width: 44px; min-height: 44px; line-height: 1; }

  /* Confirm dialog */
  .confirm-box { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 300; display: none; align-items: center; justify-content: center; padding: 20px; }
  .confirm-box.visible { display: flex; }
  .confirm-inner { background: #1a1a1a; border: 1px solid #333; border-radius: 16px; padding: 28px 24px; max-width: 360px; width: 100%; font-family: sans-serif; }
  .confirm-inner h3 { font-size: 18px; font-weight: 700; color: #f5f5f4; margin-bottom: 8px; }
  .confirm-inner p { font-size: 14px; color: #a8a29e; margin-bottom: 20px; line-height: 1.5; }
  .confirm-btns { display: flex; gap: 10px; }

  /* Notifications */
  .notification { position: fixed; top: 16px; left: 12px; right: 12px; border-radius: 10px; padding: 14px 18px; font-size: 15px; font-weight: 600; z-index: 999; box-shadow: 0 8px 32px #00000088; font-family: sans-serif; display: none; max-width: 500px; margin: 0 auto; }
  .notification.success { background: #14532d; border: 1px solid #4ade80; color: #bbf7d0; }
  .notification.error { background: #7f1d1d; border: 1px solid #f87171; color: #fca5a5; }
  .notification.info { background: #1e3a5f; border: 1px solid #60a5fa; color: #bfdbfe; }

  /* Print / Report */
  .report-paper { background: white; color: #1a1a1a; border-radius: 12px; padding: 28px; font-family: sans-serif; }
  .report-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px; border-bottom: 3px solid #2d5a1b; padding-bottom: 16px; flex-wrap: wrap; gap: 12px; }
  .report-logo { font-size: 20px; font-weight: 900; color: #2d5a1b; letter-spacing: -1px; line-height: 1.1; }
  .report-customer { text-align: right; }
  .report-customer-name { font-size: 18px; font-weight: 700; color: #2d5a1b; }
  .report-customer-sub { font-size: 12px; color: #666; margin-top: 3px; }
  .report-section-title { font-size: 12px; font-weight: 700; color: #2d5a1b; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
  .report-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-bottom: 20px; }
  .report-table th { background: #f0f7ee; padding: 7px 10px; text-align: left; color: #2d5a1b; font-weight: 600; }
  .report-table th.center { text-align: center; }
  .report-table td { padding: 7px 10px; border-bottom: 1px solid #eee; }
  .report-table td.center { text-align: center; font-weight: 700; font-family: monospace; }
  .report-table tr:nth-child(even) td { background: #f9f9f9; }
  .report-footer { margin-top: 24px; padding-top: 16px; border-top: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; font-size: 11px; color: #999; }

  /* Loading / Empty */
  .loading { text-align: center; padding: 70px 20px; color: #78716c; font-family: sans-serif; }
  .spinner { display: inline-block; width: 32px; height: 32px; border: 3px solid #333; border-top-color: #4ade80; border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty { text-align: center; padding: 48px 20px; color: #78716c; font-family: sans-serif; }
  .empty-icon { font-size: 44px; margin-bottom: 12px; }
  .empty-title { font-size: 15px; font-weight: 700; color: #f5f5f4; margin-bottom: 4px; }

  /* Settings */
  .setting-row { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; border-bottom: 1px solid #1e1e1e; flex-wrap: wrap; gap: 10px; }
  .setting-label { font-size: 14px; font-weight: 600; color: #d6d3d1; font-family: sans-serif; }
  .setting-sub { font-size: 12px; color: #78716c; font-family: sans-serif; margin-top: 2px; }
  .api-key-display { font-family: monospace; font-size: 13px; color: #4ade80; background: #0a1f0f; border: 1px solid #4ade8033; border-radius: 6px; padding: 6px 12px; }

  /* Back link */
  .back-btn { display: inline-flex; align-items: center; gap: 6px; color: #78716c; font-family: sans-serif; font-size: 14px; cursor: pointer; margin-bottom: 18px; background: none; border: none; padding: 0; }
  .back-btn:hover { color: #a8a29e; }

  /* AI status banner */
  .ai-banner { background: #1a1a00; border: 1px solid #fb923c33; border-radius: 10px; padding: 14px 16px; margin-bottom: 14px; font-family: sans-serif; font-size: 13px; color: #fb923c; display: flex; align-items: center; gap: 10px; }
  .ai-success-banner { background: #0a1f0f; border: 1px solid #4ade8033; border-radius: 10px; padding: 14px 16px; margin-bottom: 14px; font-family: sans-serif; font-size: 13px; color: #4ade80; }
  .extracted-info { background: #111; border: 1px solid #222; border-radius: 10px; padding: 14px 16px; margin-bottom: 14px; font-family: sans-serif; font-size: 13px; }
  .extracted-info div { margin-bottom: 4px; color: #a8a29e; }
  .extracted-info strong { color: #d6d3d1; }

  /* Print */
  @media print {
    .header, .no-print { display: none !important; }
    body { background: white; }
    .main { padding: 0; }
    .report-paper { border-radius: 0; box-shadow: none; }
  }

  /* Mobile */
  @media (max-width: 600px) {
    .stats-grid { grid-template-columns: 1fr 1fr; }
    .grid-2 { grid-template-columns: 1fr; }
    .grid-3 { grid-template-columns: 1fr 1fr; }
    .nav-btn { padding: 0 8px; font-size: 12px; }
    .logo-sub { display: none; }
    .main { padding: 16px 12px; }
    .card { padding: 16px; }
  }
</style>
</head>
<body>

<div class="notification" id="notification"></div>

<div class="confirm-box" id="confirm-box">
  <div class="confirm-inner">
    <h3 id="confirm-title">Are you sure?</h3>
    <p id="confirm-msg"></p>
    <div class="confirm-btns">
      <button class="btn-danger btn-sm" id="confirm-yes">Delete</button>
      <button class="btn-outline btn-sm" onclick="closeConfirm()">Cancel</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="info-modal" onclick="closeInfoModal(event)">
  <div class="modal" id="info-modal-body"></div>
</div>

<input type="file" accept="image/*" id="file-input" style="display:none">
<input type="file" accept="application/json" id="import-input" style="display:none">

<div class="header">
  <div class="logo">
    <div class="logo-icon">
      <svg width="38" height="38" viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="38" height="38" rx="8" fill="#1a1208"/>
        <path d="M6 28c2-4 5-3 8-5s4-6 7-5 3 4 6 3 5-3 5-3v10H6z" fill="#3d2b1f"/>

        <circle cx="12" cy="24" r="1.2" fill="#78716c" opacity="0.5"/>
        <circle cx="22" cy="26" r="0.8" fill="#78716c" opacity="0.4"/>

        <path d="M19 8c0 0-4 3-5 6" stroke="#4ade80" stroke-width="1.5" stroke-linecap="round" fill="none"/>
        <path d="M19 10c0 0 3 2 4 5" stroke="#4ade80" stroke-width="1.5" stroke-linecap="round" fill="none"/>
        <ellipse cx="14" cy="13" rx="3" ry="4" fill="#4ade80" opacity="0.8" transform="rotate(-20 14 13)"/>
        <ellipse cx="23" cy="14" rx="2.5" ry="3.5" fill="#22c55e" opacity="0.7" transform="rotate(15 23 14)"/>

    <div>
      <div class="logo-text">SoilTracks</div>

  <div class="nav">
    <button class="nav-btn active" id="nav-dashboard" onclick="showPage('dashboard')">Dashboard</button>

<div class="main" id="app-root"></div>

<script>
// ══════════════════════════════════════════════════════
// Storage
// ══════════════════════════════════════════════════════
var LS = {
  CUSTOMERS: 'st_customers',
  SAMPLES:   'st_samples',
  API_KEY:   'st_apikey'
};

function loadData() {
  try { customers = JSON.parse(localStorage.getItem(LS.CUSTOMERS) || '[]'); } catch(e) { customers = []; }
  try { samples   = JSON.parse(localStorage.getItem(LS.SAMPLES)   || '[]'); } catch(e) { samples = []; }
}
function saveCustomers() { localStorage.setItem(LS.CUSTOMERS, JSON.stringify(customers)); }
function saveSamples()   { localStorage.setItem(LS.SAMPLES,   JSON.stringify(samples)); }
function getApiKey()     { return localStorage.getItem(LS.API_KEY) || ''; }
function setApiKey(k)    { localStorage.setItem(LS.API_KEY, k.trim()); }

function genId() {
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
    var r = Math.random() * 16 | 0;
    return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
  });
}

// ══════════════════════════════════════════════════════
// State
// ══════════════════════════════════════════════════════
var customers = [];
var samples   = [];
var currentPage = 'dashboard';
var activeCustomerId = null;
var scanPrefill = null;
var pendingConfirmFn = null;

// ══════════════════════════════════════════════════════
// Metric definitions
// ══════════════════════════════════════════════════════
var METRICS = [
  { key:'pH',           label:'Soil pH',          unit:'',         optMin:6.0,  optMax:7.0,  section:'Lab Results',
    desc:'Measures soil acidity or alkalinity. Most nutrients are best available between 6.0–7.0.',
    rec:'If too low, apply limestone. If too high, apply sulfur.' },
  { key:'phosphorus',   label:'Phosphorus (P)',    unit:'lb/A',     optMin:50,   optMax:100,  section:'Lab Results',
    desc:'Drives root development and early establishment. High levels can interfere with zinc and iron uptake.',
    rec:'If deficient, apply phosphate fertilizer. Avoid excess — runoff harms waterways.' },
  { key:'organicMatter',label:'Organic Matter',    unit:'%',        optMin:3,    optMax:6,    section:'Lab Results',
    desc:'Improves water retention, feeds soil biology, and buffers pH swings.',
    rec:'Top-dress with compost, use organic fertilizers, minimize soil disturbance.' },
  { key:'acidity',      label:'Buffer Acidity',    unit:'meq/100g', optMin:0,    optMax:2,    section:'Exchangeable Cations',
    desc:'Reserve acidity in soil. Higher values mean more limestone is needed to raise pH.',
    rec:'This value determines your limestone application rate.' },
  { key:'potassium',    label:'Potassium (K)',      unit:'meq/100g', optMin:0.15, optMax:0.40, section:'Exchangeable Cations',
    desc:'Essential for water regulation, disease resistance, and winter hardiness.',
    rec:'If deficient, apply potash (K₂O). Important for stress tolerance.' },
  { key:'magnesium',    label:'Magnesium (Mg)',     unit:'meq/100g', optMin:0.5,  optMax:2.5,  section:'Exchangeable Cations',
    desc:'The central atom in every chlorophyll molecule. Plants cannot photosynthesize without it.',
    rec:'If deficient, apply dolomitic limestone or Epsom salt.' },
  { key:'calcium',      label:'Calcium (Ca)',       unit:'meq/100g', optMin:5,    optMax:15,   section:'Exchangeable Cations',
    desc:'Builds strong cell walls and improves soil structure. Primary component of limestone.',
    rec:'If deficient, apply calcitic or dolomitic limestone.' },
  { key:'cec',          label:'CEC',                unit:'meq/100g', optMin:10,   optMax:20,   section:'Exchangeable Cations', infoOnly:true,
    desc:'Total ability of soil to hold nutrient ions. Higher CEC means less leaching risk.',
    rec:'CEC is informational. Improve it long-term by adding organic matter.' },
  { key:'satK',         label:'K Saturation',       unit:'%',        optMin:2,    optMax:5,    section:'% Saturation of CEC',
    desc:'Percentage of CEC occupied by potassium. Too high can block magnesium and calcium uptake.',
    rec:'If too low, apply potassium. If too high, balance with calcium and magnesium.' },
  { key:'satMg',        label:'Mg Saturation',      unit:'%',        optMin:10,   optMax:20,   section:'% Saturation of CEC',
    desc:'Percentage of CEC occupied by magnesium. Low levels cause chlorophyll deficiency.',
    rec:'If deficient, apply dolomitic limestone or Epsom salt.' },

// ══════════════════════════════════════════════════════
// Utilities
// ══════════════════════════════════════════════════════
function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmt(v, digits) {
  if (v === undefined || v === null || v === '') return '<span class="badge-gray">—</span>';
  var n = parseFloat(v);
  if (isNaN(n)) return '<span class="badge-gray">—</span>';
  return n.toFixed(digits !== undefined ? digits : (n % 1 === 0 ? 0 : 1));
}

function statusBadge(metric, val) {
  if (metric.infoOnly || val === undefined || val === null || val === '') return '';
  var n = parseFloat(val);
  if (isNaN(n)) return '';
  if (n >= metric.optMin && n <= metric.optMax) return '<span class="badge badge-green">OK</span>';
  if (n > metric.optMax) return '<span class="badge badge-orange">High</span>';
  return '<span class="badge badge-red">Low</span>';
}

function setRoot(html) { document.getElementById('app-root').innerHTML = html; }

function showNotification(msg, type, duration) {
  var el = document.getElementById('notification');
  el.textContent = msg;
  el.className = 'notification ' + (type || 'success');
  el.style.display = 'block';
  clearTimeout(el._timer);
  el._timer = setTimeout(function() { el.style.display = 'none'; }, duration || 3000);
}

function showPage(name) {
  currentPage = name;
  document.querySelectorAll('.nav-btn').forEach(function(b) { b.classList.remove('active'); });
  var nb = document.getElementById('nav-' + name);
  if (nb) nb.classList.add('active');
  if (name === 'dashboard')  renderDashboard();
  else if (name === 'customers') renderCustomers();
  else if (name === 'settings')  renderSettings();
}

function handleImageFile(file) {
  if (!file.type.startsWith('image/')) {
    showNotification('Please choose an image file.', 'error');
    return;
  }
  var apiKey = getApiKey();
  if (!apiKey) {
    showNotification('Add your Anthropic API key in Settings first.', 'error');
    return;
  }

  var c = customers.find(function(x){ return x.id === activeCustomerId; });
  var html = '<button class="back-btn" onclick="renderScanStep()">&larr; Back</button>';
  html += '<div class="page-title">Scanning Report' + (c ? ' — ' + esc(c.name) : '') + '</div>';
  html += '<div class="loading"><div class="spinner"></div><p style="margin-top:12px;font-family:sans-serif">AI is reading your report...<br><span style="font-size:13px;color:#57534e">This usually takes 10–20 seconds.</span></p></div>';
  setRoot(html);

  compressToLimit(file, 65000, function(b64, mime) {
    callClaude(b64, mime || file.type, function(result) {
      if (!result.success) {
        showNotification('Extraction failed: ' + result.error, 'error', 6000);
        renderManualForm(null);
        return;
      }
      scanPrefill = result.data;
      renderManualForm(result.data);
    });
  });
}

function compressToLimit(file, maxChars, cb) {
  var steps = [
    { w: 1800, q: 0.82 }, { w: 1600, q: 0.75 }, { w: 1400, q: 0.68 },
    { w: 1200, q: 0.60 }, { w: 1000, q: 0.55 }, { w: 900,  q: 0.50 },
    { w: 800,  q: 0.45 }
  ];
  var idx = 0;
  var canvas = document.createElement('canvas');
  var ctx = canvas.getContext('2d');
  var img = new Image();
  var url = URL.createObjectURL(file);
  img.onload = function() {
    URL.revokeObjectURL(url);
    function tryStep() {
      if (idx >= steps.length) {
        doCompress(steps[steps.length - 1].w, steps[steps.length - 1].q);
        return;
      }
      doCompress(steps[idx].w, steps[idx].q);
    }
    function doCompress(maxW, q) {
      var scale = Math.min(1, maxW / Math.max(img.width, img.height));
      canvas.width  = Math.round(img.width  * scale);
      canvas.height = Math.round(img.height * scale);
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      var dataUrl = canvas.toDataURL('image/jpeg', q);
      var b64 = dataUrl.split(',')[1];
      if (b64.length <= maxChars || idx >= steps.length - 1) {
        cb(b64, 'image/jpeg');
      } else {
        idx++;
        tryStep();
      }
    }
    tryStep();
  };
  img.onerror = function() {
    var reader = new FileReader();
    reader.onload = function(e) {
      var b64 = e.target.result.split(',')[1];
      cb(b64, file.type);
    };
    reader.readAsDataURL(file);
  };
  img.src = url;
}

function callClaude(imageBase64, mimeType, cb) {
  var apiKey = getApiKey();
  if (!apiKey) { cb({ success: false, error: 'No API key configured.' }); return; }

  var prompt = 'Extract soil test data from this Penn State Extension soil report image. '
    + 'Return ONLY valid JSON with these exact keys:\n'
    + '{"CustomerName":"","Field":"","Year":"","pH":null,"phosphorus":null,"organicMatter":null,'
    + '"acidity":null,"potassium":null,"magnesium":null,"calcium":null,"cec":null,'
    + '"satK":null,"satMg":null,"satCa":null,"limestoneLbs":null,"recN":null,"recP":null,"recK":null}\n\n'
    + 'CustomerName = name from SOIL TEST REPORT FOR line.\n'
    + 'Field = FIELD ID value.\n'
    + 'Year = 4-digit year from DATE field.\n'
    + 'pH = soil pH number.\n'
    + 'phosphorus = P in lb/A.\n'
    + 'organicMatter = Organic Matter %.\n'
    + 'acidity = Buffer Acidity in meq/100g.\n'
    + 'potassium = K in meq/100g.\n'
    + 'magnesium = Mg in meq/100g.\n'
    + 'calcium = Ca in meq/100g.\n'
    + 'cec = CEC in meq/100g.\n'
    + 'satK = K Saturation %.\n'
    + 'satMg = Mg Saturation %.\n'
    + 'satCa = Ca Saturation %.\n'
    + 'limestoneLbs = Limestone rec as number (lb/1000 sq ft) or null.\n'
    + 'recN = Nitrogen rec as written (e.g. "1.5 lb") or null.\n'
    + 'recP = Phosphorus rec as written or null.\n'
    + 'recK = Potassium rec as written or null.\n'
    + 'Use null for any field not found. Return ONLY the JSON object, nothing else.';

  fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'content-type': 'application/json',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-haiku-4-5-20251001',
      max_tokens: 1024,
      messages: [{
        role: 'user',
        content: [
          { type: 'image', source: { type: 'base64', media_type: mimeType, data: imageBase64 } },
          { type: 'text', text: prompt }
        ]
      }]
    }),
    signal: AbortSignal.timeout ? AbortSignal.timeout(55000) : undefined
  })
  .then(function(r) {
    if (!r.ok) {
      return r.text().then(function(t) {
        cb({ success: false, error: 'API error ' + r.status + ': ' + t.substring(0, 200) });
      });
    }
    return r.json().then(function(json) {
      var textContent = (json.content || []).find(function(c){ return c.type === 'text'; });
      if (!textContent) { cb({ success: false, error: 'No text in AI response.' }); return; }
      var raw = textContent.text.trim();
      var match = raw.match(/\{[\s\S]*\}/);
      try {
        cb({ success: true, data: JSON.parse(match ? match[0] : raw) });
      } catch(e) {
        cb({ success: false, error: 'Could not parse response: ' + e.message });
      }
    });
  })
  .catch(function(e) {
    cb({ success: false, error: e.message || String(e) });
  });
}

// ══════════════════════════════════════════════════════
// Manual entry form (also used after AI scan)
// ══════════════════════════════════════════════════════
function renderManualForm(prefill) {
  var c = customers.find(function(x){ return x.id === activeCustomerId; });
  var p = prefill || {};
  var html = '<button class="back-btn" onclick="renderScanStep()">&larr; Back</button>';
  html += '<div class="page-title">' + (prefill ? 'Review Extracted Data' : 'Enter Sample Data') + (c ? ' — ' + esc(c.name) : '') + '</div>';

  if (prefill) {
    html += '<div class="ai-success-banner">✓ AI extracted values below. Review and correct as needed before saving.</div>';
    var info = [];
    if (p.CustomerName) info.push('<div><strong>Name:</strong> ' + esc(p.CustomerName) + '</div>');
    if (p.Field)  info.push('<div><strong>Field:</strong> ' + esc(p.Field) + '</div>');
    if (p.Year)   info.push('<div><strong>Year:</strong> ' + esc(p.Year) + '</div>');
    if (info.length) html += '<div class="extracted-info">' + info.join('') + '</div>';
  }

  function fv(k) {
    var v = p[k];
    return (v !== null && v !== undefined && v !== '') ? String(v) : '';
  }
  var yearNow = new Date().getFullYear();

  html += '<div class="card">';
  html += '<div class="form-group"><label class="form-label">Year *</label>'
    + '<input class="form-input" id="sf-year" type="number" value="' + (fv('Year') || yearNow) + '" min="1990" max="2099"></div>';

  LAB_SECTIONS.forEach(function(section) {
    html += '<div class="sub-head">' + section + '</div><div class="grid-3">';
    METRICS.filter(function(m){ return m.section === section; }).forEach(function(m) {
      html += '<div class="form-group"><label class="form-label">' + m.label;
      if (m.unit) html += ' <span style="color:#57534e;font-weight:400">' + m.unit + '</span>';
      html += '</label><input class="form-input" id="sf-' + m.key + '" type="number" step="any" value="' + fv(m.key) + '" placeholder="—"></div>';
    });
    html += '</div>';
  });

  html += '<div class="sub-head">Recommendations</div><div class="grid-2">';
  REC_KEYS.forEach(function(r) {
    html += '<div class="form-group"><label class="form-label">' + r.label + '</label>'
      + '<input class="form-input" id="sf-' + r.key + '" value="' + fv(r.key) + '" placeholder="—"></div>';
  });
  html += '</div>';

  html += '<div class="form-group"><label class="form-label">Notes</label>'
    + '<textarea class="form-input" id="sf-notes" placeholder="Any observations...">' + fv('notes') + '</textarea></div>';

  html += '<button class="btn-green btn-full" onclick="saveSampleForm()">Save Sample</button>';
  html += '</div>';
  setRoot(html);
}

function saveSampleForm() {
  var year = parseInt(document.getElementById('sf-year').value);
  if (!year || year < 1990 || year > 2099) {
    showNotification('Please enter a valid year (1990–2099).', 'error');
    return;
  }
  if (!activeCustomerId) {
    showNotification('No customer selected.', 'error');
    return;
  }

  var sample = {
    id:         genId(),
    customerId: activeCustomerId,
    year:       year,
    notes:      document.getElementById('sf-notes').value.trim(),
    createdAt:  new Date().toISOString()
  };

  METRICS.forEach(function(m) {
    var raw = document.getElementById('sf-' + m.key).value.trim();
    sample[m.key] = raw !== '' ? parseFloat(raw) : null;
  });

  REC_KEYS.forEach(function(r) {
    var raw = document.getElementById('sf-' + r.key).value.trim();
    sample[r.key] = raw !== '' ? raw : null;
  });

  samples.push(sample);
  saveSamples();
  showNotification('Sample saved for ' + year + '.', 'success');
  openCustomer(activeCustomerId);
}

// ══════════════════════════════════════════════════════
// Delete
// ══════════════════════════════════════════════════════
function confirmDeleteCustomer(id) {
  var c = customers.find(function(x){ return x.id === id; });
  if (!c) return;
  var cs = samples.filter(function(s){ return s.customerId === id; }).length;
  showConfirm(
    'Delete ' + c.name + '?',
    'This will permanently delete the customer and all ' + cs + ' sample' + (cs !== 1 ? 's' : '') + '.',
    function() {
      customers = customers.filter(function(x){ return x.id !== id; });
      samples   = samples.filter(function(s){ return s.customerId !== id; });
      saveCustomers(); saveSamples();
      showNotification('Customer deleted.', 'success');
      renderDashboard();
    }
  );
}

function confirmDeleteSample(id) {
  var s = samples.find(function(x){ return x.id === id; });
  if (!s) return;
  showConfirm(
    'Delete ' + s.year + ' sample?',
    'This will permanently remove this soil test result.',
    function() {
      var cid = s.customerId;
      samples = samples.filter(function(x){ return x.id !== id; });
      saveSamples();
      showNotification('Sample deleted.', 'success');
      openCustomer(cid);
    }
  );
}

function showConfirm(title, msg, onYes) {
  document.getElementById('confirm-title').textContent = title;
  document.getElementById('confirm-msg').textContent   = msg;
  pendingConfirmFn = onYes;
  document.getElementById('confirm-box').classList.add('visible');
  document.getElementById('confirm-yes').onclick = function() {
    closeConfirm();
    if (pendingConfirmFn) pendingConfirmFn();
  };
}

function closeConfirm() {
  document.getElementById('confirm-box').classList.remove('visible');
  pendingConfirmFn = null;
}

// Metric info modal
// ══════════════════════════════════════════════════════
function showMetricInfo(key) {
  var m = METRICS.find(function(x){ return x.key === key; });
  if (!m) return;
  var html = '<button class="modal-close" onclick="closeInfoModal()">×</button>'
    + '<h2>' + m.label + '</h2>'
    + '<div class="modal-range">' + (m.infoOnly ? 'Informational' : 'Ideal: ' + m.optMin + ' – ' + m.optMax + ' ' + m.unit) + '</div>'
    + '<div class="modal-section"><div class="modal-section-title">About</div><div class="modal-body">' + m.desc + '</div></div>'
    + '<div class="modal-section"><div class="modal-section-title">Recommendation</div><div class="modal-body">' + m.rec + '</div></div>';
  document.getElementById('info-modal-body').innerHTML = html;
  document.getElementById('info-modal').classList.add('visible');
}

function closeInfoModal(e) {
  if (!e || e.target === document.getElementById('info-modal')) {
    document.getElementById('info-modal').classList.remove('visible');
  }
}

// ══════════════════════════════════════════════════════
// Print report
// ══════════════════════════════════════════════════════
function printCustomerReport(id) {
  var c = customers.find(function(x){ return x.id === id; });
  if (!c) return;
  var cs = samples.filter(function(s){ return s.customerId === id; }).sort(function(a,b){ return b.year - a.year; });
  if (cs.length === 0) { showNotification('No samples to print.', 'error'); return; }

  var years = cs.map(function(s){ return s.year; });
  var today = new Date().toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' });

  var html = '<div class="report-paper">';
  html += '<div class="report-header">'
    + '<div class="report-logo"><span>SoilTracks</span><span style="font-size:13px;font-weight:400;color:#666">Lawns Plants &amp; Pests LLC</span></div>'
    + '<div class="report-customer"><div class="report-customer-name">' + esc(c.name) + '</div>'
    + '<div class="report-customer-sub">' + (c.field ? esc(c.field) + ' · ' : '') + 'Printed ' + today + '</div></div>'
    + '</div>';

  html += '<div class="report-section-title">Soil Test Results</div>';
  html += '<table class="report-table"><thead><tr><th>Metric</th><th>Unit</th><th>Ideal Range</th>';
  years.forEach(function(y){ html += '<th class="center">' + y + '</th>'; });
  html += '</tr></thead><tbody>';

  LAB_SECTIONS.forEach(function(section) {
    html += '<tr><td colspan="' + (3 + years.length) + '" style="background:#f0f7ee;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#2d5a1b;padding:8px 10px">' + section + '</td></tr>';
    METRICS.filter(function(m){ return m.section === section; }).forEach(function(m) {
      html += '<tr><td>' + m.label + '</td><td style="color:#999">' + (m.unit || '—') + '</td>';
      html += '<td style="font-family:monospace;font-size:11px;color:#999">' + (m.infoOnly ? 'info' : m.optMin + '–' + m.optMax) + '</td>';
      cs.forEach(function(s) {
        var val = s[m.key];
        var n = parseFloat(val);
        var color = '';
        if (!m.infoOnly && !isNaN(n)) {
          color = (n >= m.optMin && n <= m.optMax) ? 'color:#16a34a' : (n > m.optMax ? 'color:#d97706' : 'color:#dc2626');
        }
        html += '<td class="center" style="' + color + '">' + (val !== null && val !== undefined && val !== '' ? parseFloat(val).toFixed(1) : '—') + '</td>';
      });
      html += '</tr>';
    });
  });

  html += '<tr><td colspan="' + (3 + years.length) + '" style="background:#f0f7ee;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#2d5a1b;padding:8px 10px">Recommendations</td></tr>';
  REC_KEYS.forEach(function(r) {
    html += '<tr><td colspan="3">' + r.label + '</td>';
    cs.forEach(function(s) {
      var v = s[r.key];
      html += '<td class="center">' + (v !== null && v !== undefined && v !== '' ? esc(v) : '—') + '</td>';
    });
    html += '</tr>';
  });

  html += '</tbody></table>';
  html += '<div class="report-footer"><span>SoilTracks · Lawns Plants &amp; Pests LLC</span><span>' + today + '</span></div>';
  html += '</div>';

  var w = window.open('', '_blank', 'width=900,height=700');
  w.document.write('<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Soil Report — ' + c.name + '</title>'
    + '<style>body{margin:20px;font-family:sans-serif;background:white}'
    + '.report-paper{max-width:850px;margin:0 auto}'
    + '.report-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;border-bottom:3px solid #2d5a1b;padding-bottom:16px;flex-wrap:wrap;gap:12px}'
    + '.report-logo{font-size:20px;font-weight:900;color:#2d5a1b;line-height:1.2}'
    + '.report-customer-name{font-size:18px;font-weight:700;color:#2d5a1b}'
    + '.report-customer-sub{font-size:12px;color:#666;margin-top:3px}'
    + '.report-section-title{font-size:12px;font-weight:700;color:#2d5a1b;margin-bottom:10px;text-transform:uppercase;letter-spacing:1px}'
    + 'table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:20px}'
    + 'th{background:#f0f7ee;padding:7px 10px;text-align:left;color:#2d5a1b;font-weight:600}'
    + 'th.center{text-align:center}'
    + 'td{padding:7px 10px;border-bottom:1px solid #eee}'
    + 'td.center{text-align:center;font-weight:700;font-family:monospace}'
    + 'tr:nth-child(even) td{background:#f9f9f9}'
    + '.report-footer{margin-top:24px;padding-top:16px;border-top:1px solid #eee;display:flex;justify-content:space-between;font-size:11px;color:#999}'
    + '@media print{@page{margin:1cm}}'
    + '</style></head><body>' + html + '</body></html>');
  w.document.close();
  setTimeout(function(){ w.print(); }, 400);
}

  html += '<div class="setting-row">'
    + '<div><div class="setting-label">API Key</div>'
    + '<div class="setting-sub">Required for photo scanning. Get yours at <a href="https://console.anthropic.com" target="_blank" style="color:#4ade80">console.anthropic.com</a>.</div></div>'
    + (masked ? '<span class="api-key-display">' + masked + '</span>' : '<span style="color:#57534e;font-family:sans-serif;font-size:13px">Not set</span>')
    + '</div>';

  html += '<div class="form-group" style="margin-top:14px">'

  }
  html += '</div>';

  html += '<div class="card"><div class="sec-title">Data</div>';

    + customers.length + ' customers · ' + samples.length + ' samples stored locally in your browser.</div>';
  html += '<div class="btn-row">'
    + '<button class="btn-outline btn-sm" onclick="exportJSON()">Export Backup (.json)</button>'
    + '<button class="btn-outline btn-sm" onclick="document.getElementById(\'import-input\').click()">Import Backup</button>'
    + '</div>';
  html += '<div style="margin-top:14px">'
    + '<button class="btn-danger btn-sm" onclick="confirmClearAll()">Clear All Data</button>'
    + '</div></div>';

  html += '<div class="card"><div class="sec-title">About</div>'

    + 'Data is stored in your browser\'s local storage. Use <b>Export Backup</b> regularly to avoid data loss.<br>'
    + 'AI scanning uses Claude (Anthropic) directly from your browser. Your API key is never sent anywhere except Anthropic.'
    + '</div></div>';

function saveApiKey() {
  var val = document.getElementById('set-apikey').value.trim();
  if (!val) { showNotification('Please enter an API key.', 'error'); return; }
  if (!val.startsWith('sk-ant-')) { showNotification('API key should start with sk-ant-', 'error'); return; }
  setApiKey(val);
  showNotification('API key saved.', 'success');
  renderSettings();
}

function clearApiKey() {
  localStorage.removeItem(LS.API_KEY);
  showNotification('API key cleared.', 'info');
  renderSettings();
}

// ══════════════════════════════════════════════════════
// Export / Import
// ══════════════════════════════════════════════════════
function exportJSON() {
  var data = { version: 1, exportedAt: new Date().toISOString(), customers: customers, samples: samples };
  var blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'soiltracks-backup-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(a.href);
  showNotification('Backup downloaded.', 'success');
}

function importJSON(file) {
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var data = JSON.parse(e.target.result);
      if (!Array.isArray(data.customers) || !Array.isArray(data.samples)) {
        showNotification('Invalid backup file format.', 'error'); return;
      }
      showConfirm(
        'Import Backup?',
        'This will replace all current data with ' + data.customers.length + ' customers and ' + data.samples.length + ' samples from the backup.',
        function() {
          customers = data.customers;
          samples   = data.samples;
          saveCustomers(); saveSamples();
          showNotification('Data imported: ' + customers.length + ' customers, ' + samples.length + ' samples.', 'success');
          renderDashboard();
        }
      );
    } catch(err) {
      showNotification('Could not read file: ' + err.message, 'error');
    }
  };
  reader.readAsText(file);
}

function confirmClearAll() {
  showConfirm(
    'Clear All Data?',
    'This permanently deletes ALL customers (' + customers.length + ') and samples (' + samples.length + '). This cannot be undone.',
    function() {
      customers = []; samples = [];
      saveCustomers(); saveSamples();
      showNotification('All data cleared.', 'info');
      renderDashboard();
    }
  );
}

// ══════════════════════════════════════════════════════
// Analytics helpers
// ══════════════════════════════════════════════════════
function calcTopIssues() {
  var counts = {};
  samples.forEach(function(s) {
    METRICS.forEach(function(m) {
      if (m.infoOnly) return;
      var n = parseFloat(s[m.key]);
      if (isNaN(n)) return;
      if (n < m.optMin || n > m.optMax) counts[m.key] = (counts[m.key] || 0) + 1;
    });
  });
  return Object.keys(counts)
    .sort(function(a,b){ return counts[b] - counts[a]; })
    .slice(0, 4)
    .map(function(k) {
      var m = METRICS.find(function(x){ return x.key === k; });
      return { key: k, label: m ? m.label : k, count: counts[k] };
    });
}

function calcOverallImprovement() {
  if (samples.length === 0) return null;
  var pHScores = samples.filter(function(s){ return s.pH !== null && s.pH !== undefined; }).map(function(s){ return parseFloat(s.pH); }).filter(function(n){ return !isNaN(n); });
  if (pHScores.length === 0) return null;
  var total = 0, count = 0;
  METRICS.forEach(function(m) {
    if (m.infoOnly) return;
    var vals = samples.map(function(s){ return parseFloat(s[m.key]); }).filter(function(n){ return !isNaN(n); });
    if (vals.length === 0) return;
    var ok = vals.filter(function(n){ return n >= m.optMin && n <= m.optMax; }).length;
    total += Math.round((ok / vals.length) * 100);
    count++;
  });
  return count > 0 ? Math.round(total / count) : null;
}
